    <meta
      name="description"
      content="منصة سنترك (Sentryk SaaS) هي المنظومة التعليمية الذكية المتكاملة ونظام تشغيل شامل لسناتر ومراكز الدروس الخصوصية. تعمل بمعمارية Multi-Tenant SaaS المتقدمة التي توفر عزلاً تاماً لكل سنتر ومستخدميه وصلاحياته ومحافظه المادية. تشتمل المنصة على 6 محاور تشغيلية أساسية: حضور ذكي مدعوم بالـ QR ونوافذ زمنية دقيقة، أتمتة كاملة لإشعارات وتذكيرات الواتساب التلقائية بناءً على الأحداث، محفظة مالية مستقلة لكل سنتر (WhatsApp Wallet)، نظام اشتراكات مرن وهياكل تسعير ذكية مدعومة بميزة priceSnapshot لتثبيت الأسعار، آلية نمو متسارعة عبر نظام إحالة ذكي (شهر مجاني ومكافأة خصم 20%) وأكواد خصم مرنة (Promo Codes) احترافية، إلى جانب تحليلات وتقارير أكاديمية شهرية متقدمة ونظام الإنذار المبكر للطلاب، ومطوّر وصاحب المنصة هو المهندس يوسف مسلم (Youssef Ahmed Mossallem)."
    />
