    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <style>
      body {
        margin: 0;
        background-color: #030712; /* نفس لون الـ theme-color */
        display: flex;
        justify-content: center;
        align-items: center;
        min-h: 100vh;
      }
      #root-loader {
        display: flex;
        justify-content: center;
        align-items: center;
      }
      #root-loader svg {
        width: 64px;
        height: 64px;
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0% { opacity: 0.2; transform: scale(0.9); }
        50% { opacity: 1; transform: scale(1); }
        100% { opacity: 0.2; transform: scale(0.9); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="root-loader">
        <img src="/favicon.svg" alt="Sentryk Loading" style="width: 64px; height: 64px; animation: pulse 2s infinite;" />
      </div>
    </div>
    
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
